physics_context:
  prerequisites:
    - Central-force motion and angular momentum
    - Lagrangian mechanics and Euler-Lagrange equations
    - Variational calculus (basic)
    - Coulomb potential and conic-section orbits
  notation:
    - "s — impact parameter"
    - "θ — scattering (deflection) angle"
    - "ψ — angle from horizontal to apsidal point"
    - "σ(θ) or σ(Ω) — differential cross section"
    - "σ_T — total cross section"
    - "l — orbital angular momentum"
    - "E — incident energy"
    - "V(r) — central potential"
    - "k — Coulomb force constant (k = -ZZ'e²)"
    - "ε — orbit eccentricity"
    - "H — Hamiltonian"
    - "p_i — generalized momentum"
